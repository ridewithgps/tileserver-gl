services:
  tileserver:
    build: ..
    cpus: 6
    ports:
      - "${TILESERVER_PORT:-8080}:8080"
    command: -c /data/config.json ${PUBLIC_URL:+--public_url $PUBLIC_URL}
    volumes:
      - ${TEST_DATA_DIR}:/data
      - ../src:/usr/src/app/src
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 30s
      retries: 30
      start_period: 60s
